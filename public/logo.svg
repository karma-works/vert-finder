<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-labelledby="title description">
  <title id="title">Vert Finder</title>
  <desc id="description">Three orange elevation bars inside a diamond beside the words Vert Finder.</desc>
  <rect width="320" height="80" rx="8" fill="#17201c"/>
  <g transform="translate(18 12)">
    <rect x="8" y="8" width="40" height="40" fill="none" stroke="#56605a" stroke-width="2" transform="rotate(45 28 28)"/>
    <g fill="#e8743b">
      <rect x="17" y="27" width="7" height="17"/>
      <rect x="27" y="14" width="7" height="30"/>
      <rect x="37" y="22" width="7" height="22"/>
    </g>
  </g>
  <text x="92" y="34" fill="#f5f3eb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21" font-weight="700" letter-spacing="5">VERT</text>
  <text x="92" y="60" fill="#f5f3eb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21" font-weight="700" letter-spacing="5">FINDER</text>
</svg>
